<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS.css">
    <script src="Untitled-1.js"></script>
    <title>Galeria de Fotografias</title>
</head>
<body>
    <header>
        <h1>Galeria de Fotografias</h1>
        <nav>
            <ul>
                <li><a href="#pre-wedding">Pré-Wedding</a></li>
                <li><a href="#familia">Família</a></li>
                <li><a href="#conceitual">Conceitual</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="pre-wedding">
            <h2>Fotos de Pré-Wedding</h2>
            <div class="gallery">
                <img src="imagens/pre_wedding1.jpg" alt="Pré-Wedding 1">
                <img src="imagens/pre_wedding2.jpg" alt="Pré-Wedding 2">
                <img src="imagens/pre_wedding3.jpg" alt="Pré-Wedding 3">
            </div>
        </section>

        <section id="familia">
            <h2>Fotos em Família</h2>
            <div class="gallery">
                <img src="imagens/familia1.jpg" alt="Família 1">
                <img src="imagens/familia2.jpg" alt="Família 2">
                <img src="imagens/familia3.jpg" alt="Família 3">
            </div>
        </section>

        <section id="conceitual">
            <h2>Fotos Conceituais</h2>
            <div class="gallery">
                <img src="imagens/conceitual1.jpg" alt="Conceitual 1">
                <img src="imagens/conceitual2.jpg" alt="Conceitual 2">
                <img src="imagens/conceitual3.jpg" alt="Conceitual 3">
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Galeria de Fotografias. Todos os direitos reservados.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
